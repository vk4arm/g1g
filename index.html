<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Notes from the Edge of the Empire</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <script>
        (function () {
            var v = window.location.protocol === 'file:' ? '' : '?v=' + Date.now();
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'style.css' + v;
            document.head.appendChild(link);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>

<body>
    <div id="loading-screen" class="screen active">
        <div class="cyber-spinner">
            <div class="ring ring-outer"></div>
            <div class="ring ring-inner"></div>
            <div class="core"></div>
        </div>
        <p class="loading-text">LOADING NEURAL LINK... <span id="loading-percent">0%</span></p>
    </div>

    <div id="start-screen" class="screen">
        <div class="lang-switcher">
            <button class="lang-btn" onclick="setLanguage('ru')">🇷🇺</button>
            <button class="lang-btn" onclick="setLanguage('en')">🇺🇸</button>
            <button class="lang-btn" onclick="setLanguage('de')">🇩🇪</button>
            <button class="lang-btn" onclick="setLanguage('es')">🇪🇸</button>
            <button class="lang-btn" onclick="setLanguage('zh')">🇨🇳</button>
            <button class="lang-btn" onclick="setLanguage('fa')">🇮🇷</button>
        </div>
        <h1 id="main-title">NOTES FROM THE EDGE OF THE EMPIRE</h1>
        <p id="main-subtitle">A CYBERPUNK DIARY</p>
        <div class="button-group">
            <button id="start-btn-1" class="start-btn">P1: SECTOR D LOGS</button>
            <button id="start-btn-2" class="start-btn">P2: NEURAL LINK</button>
            <button id="start-btn-3" class="start-btn">P3: COLLAPSE PROTOCOL</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="background-container">
            <div id="bg-image-1" class="bg-layer active"></div>
            <div id="bg-image-2" class="bg-layer"></div>
            <video preload="auto" id="bg-video" class="bg-layer" src="assets/video/part3_collapse.mp4" playsinline muted></video>
            <video preload="auto" id="video-bunker" class="bg-layer" src="assets/video/bunker.mp4" playsinline muted></video>
            <video preload="auto" id="video-warehouse" class="bg-layer" src="assets/video/warehouse.mp4" playsinline muted></video>
            <video preload="auto" id="video-drones" class="bg-layer" src="assets/video/drones.mp4" playsinline muted></video>
            <video preload="auto" id="video-hans-intro" class="bg-layer" src="assets/video/part2_hans_intro.mp4" playsinline muted></video>
            <video preload="auto" id="video-part2-aila" class="bg-layer" src="assets/video/part2_aila_intro.mp4" playsinline muted></video>
            <video preload="auto" id="video-part3-intro" class="bg-layer" src="assets/video/part3_intro.mp4" playsinline muted></video>
            <video preload="auto" id="video-part3-execution-plot" class="bg-layer" src="assets/video/part3_execution_plot.mp4" playsinline muted></video>
            <video preload="auto" id="video-part3-party" class="bg-layer" src="assets/video/part3_party.mp4" playsinline muted></video>
        </div>

        <div id="part-indicator" class="part-indicator">P1</div>
        <button id="view-mode-btn" class="nav-btn view-btn hidden">👁️ VIEW</button>

        <div class="overlay"></div>

        <div class="content-container">
            <div id="text-display" class="glitch-text"></div>
            <p class="instruction">CLICK OR PRESS SPACE TO CONTINUE</p>
            <div class="game-controls">
                <button id="prev-btn" class="nav-btn hidden">PREV</button>
            </div>
        </div>

        <button id="back-btn" class="back-btn">TERMINATE SESSION</button>
    </div>

    <!-- Audio Elements -->
    <audio id="audio-rap" src="assets/audio/rap.mp3" loop preload="auto"></audio>
    <audio id="audio-classical" src="assets/audio/classical.mp3" loop preload="auto"></audio>
    <audio id="audio-casino" src="assets/audio/casino.mp3" loop preload="auto"></audio>
    <audio id="audio-wm" src="assets/audio/wm.mp3" loop preload="auto"></audio>

    <script src="i18n.js"></script>
    <script>
        (function () {
            var v = window.location.protocol === 'file:' ? '' : '?v=' + Date.now();
            var script = document.createElement('script');
            script.src = 'script.js' + v;
            document.body.appendChild(script);
        })();
    </script>
</body>

</html>
