<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes from the Edge of the Empire</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="start-screen" class="screen active">
        <h1>NOTES FROM THE EDGE OF THE EMPIRE</h1>
        <p>A CYBERPUNK DIARY</p>
        <button id="start-btn">INITIALIZE CONNECTION</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="background-container">
            <div id="bg-image-1" class="bg-layer active"></div>
            <div id="bg-image-2" class="bg-layer"></div>
        </div>
        
        <div class="overlay"></div>

        <div class="content-container">
            <div id="text-display" class="glitch-text"></div>
            <p class="instruction">CLICK OR PRESS SPACE TO CONTINUE</p>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="audio-rap" src="assets/audio/rap.mp3" loop preload="auto"></audio>
    <audio id="audio-classical" src="assets/audio/classical.mp3" loop preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
