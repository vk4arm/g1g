<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Notes from the Edge of the Empire</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <script>
        (function() {
            var v = window.location.protocol === 'file:' ? '' : '?v=' + Date.now();
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'style.css' + v;
            document.head.appendChild(link);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
    <div id="start-screen" class="screen active">
        <h1>NOTES FROM THE EDGE OF THE EMPIRE</h1>
        <p>A CYBERPUNK DIARY</p>
        <div class="button-group">
            <button id="start-btn-1" class="start-btn">P1: SECTOR D LOGS</button>
            <button id="start-btn-2" class="start-btn">P2: NEURAL LINK</button>
            <button id="start-btn-3" class="start-btn">P3: COLLAPSE PROTOCOL</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="background-container">
            <div id="bg-image-1" class="bg-layer active"></div>
            <div id="bg-image-2" class="bg-layer"></div>
        </div>

        <div id="part-indicator" class="part-indicator">P1</div>
        <button id="view-mode-btn" class="nav-btn view-btn hidden">👁️ VIEW</button>

        <div class="overlay"></div>

        <div class="content-container">
            <div id="text-display" class="glitch-text"></div>
            <p class="instruction">CLICK OR PRESS SPACE TO CONTINUE</p>
            <div class="game-controls">
                <button id="prev-btn" class="nav-btn hidden">PREV</button>
                <button id="back-btn" class="back-btn hidden">&lt;&lt; BACK</button>
            </div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="audio-rap" src="assets/audio/rap.mp3" loop preload="auto"></audio>
    <audio id="audio-classical" src="assets/audio/classical.mp3" loop preload="auto"></audio>
    <audio id="audio-casino" src="assets/audio/casino.mp3" loop preload="auto"></audio>
    <audio id="audio-wm" src="assets/audio/wm.mp3" loop preload="auto"></audio>

    <script>
        (function() {
            var v = window.location.protocol === 'file:' ? '' : '?v=' + Date.now();
            var script = document.createElement('script');
            script.src = 'script.js' + v;
            document.body.appendChild(script);
        })();
    </script>
</body>

</html>
